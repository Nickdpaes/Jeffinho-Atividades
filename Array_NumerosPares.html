<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Contagem de Números Pares</title>
</head>
<body>

<h2>Exercício 2: Contagem de Números Pares</h2>

<!-- Botão que chama a função para mostrar os numeros -->
<button onclick="executar()">Contar Números Pares</button>
<p id="resultado"></p>

<script>
  // Função que recebe os numeros e conta quantos são pares
  function contarPares(num) {

    // Inicializa o contador de numeros pares
    let contador = 0;

    // Percorre cada elemento do vetor
    for (let i = 0; i < num.length; i++) {
      // Verifica se o numero é par, vendo se ele é divisivel por 2
      if (num[i] % 2 === 0) {
        contador++;
      }
    }
    // Retorna a quantidade de numeros pares
    return contador;
  }

  // Função executada quando o botao é clicado
  function executar() {

    // Os numeros de exemplo
    let numeros = [7, 12, 19, 4, 23, 8, 31, 16, 27, 2, 10, 15, 6, 29, 20, 3, 18, 25, 14, 9, 32, 5, 24, 11, 28, 1, 30, 17, 22, 13];

    let resultado = contarPares(numeros);

    // Mostra o resultado na pagina
    document.getElementById("resultado").innerHTML =
      "Quantidade de números pares: " + resultado;
  }
</script>
</body>
</html>
