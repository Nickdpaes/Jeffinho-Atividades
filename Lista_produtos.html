<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Produtos</title>
    <style>
        h1 {
            font-size: 22px;
            margin-bottom: 15px;
        }

        label {
            margin-right: 5px;
        }

        input {
            height: 20px;
            margin-right: 10px;
        }

        button {
            margin-right: 5px;
        }

        hr {
            margin: 15px 0;
        }

        h2 {
            font-size: 18px;
            margin-bottom: 10px;
        }
        table {
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid black;
            padding: 5px;
        }
    </style>
</head>

<body>
    <h1>Cadastro de Produtos (Array de Objetos)</h1>

    <label>Produto:</label>
    <input type="text" placeholder="Ex: Mouse" id="produto">

    <label>Preço (R$):</label>
    <input type="text" placeholder="Ex: 99.90" id="preco">

    <label>Quantidade:</label>
    <input type="text" placeholder="Ex: 2" id="quantidade">

    <button onclick="adicionarProduto()">Adicionar produto</button>
    <button onclick="listarProdutos()">Listar produtos</button>
    <button onclick="resumo()">Resumo</button>
    <button onclick="limparTudo()">Limpar tudo</button>

    <hr>

    <h2>Remover por índice</h2>

    <input type="text" placeholder="Ex: 0" id="indice">
    <button onclick="removerPorIndice()">Remover</button>

    <p id="mensagem"></p>
    <p id="resumo-mensagem"></p>

    <div id="area-lista" style="display: none;">
        <h2>Produtos cadastrados</h2>

        <table border="1" id="tabela-produtos">
            <thead>
                <tr>
                    <th>Índice</th>
                    <th>Produto</th>
                    <th>Preço (R$)</th>
                    <th>Qtd</th>
                    <th>Subtotal (R$)</th>
                </tr>
            </thead>
            <tbody id="lista-produtos">
            </tbody>
        </table>
    </div>

    <script>
        let produtos = [];

        function adicionarProduto() {

            let nome = document.getElementById("produto").value.trim();
            let preco = Number(document.getElementById("preco").value);
            let quantidade = Number(document.getElementById("quantidade").value);

            if (!nome || !preco || !quantidade) return;

            let produto = {
                nome: nome,
                preco: preco,
                quantidade: quantidade
            };

            produtos.push(produto);

            document.getElementById("mensagem").innerText =
                "Produto adicionado. Total cadastrados: " + produtos.length;

            document.getElementById("produto").value = "";
            document.getElementById("preco").value = "";
            document.getElementById("quantidade").value = "";
        }

        function listarProdutos() {

            let area = document.getElementById("area-lista");
            let tbody = document.getElementById("lista-produtos");
            
            area.style.display = "block";

            for (let i = 0; i < produtos.length; i++) {

                let produto = produtos[i];
                let subtotal = produto.preco * produto.quantidade;

                let linha = document.createElement("tr");

                linha.innerHTML =
                    "<td>" + i + "</td>" +
                    "<td>" + produto.nome + "</td>" +
                    "<td>" + produto.preco.toFixed(2) + "</td>" +
                    "<td>" + produto.quantidade + "</td>" +
                    "<td>" + subtotal.toFixed(2) + "</td>";

                tbody.appendChild(linha);
            }
        }

        function resumo() {

            let mensagem = document.getElementById("mensagem");

            if (produtos.length === 0) {
                mensagem.innerText = "Não há produtos cadastrados.";
                return;
            }

            let totalProdutos = produtos.length;
            let totalItens = 0;
            let valorTotal = 0;

            for (let i = 0; i < produtos.length; i++) {
                totalItens += produtos[i].quantidade;
                valorTotal += produtos[i].preco * produtos[i].quantidade;
            }

            mensagem.innerHTML =
                "<h2>Resumo</h2>" +
                "<p>Total de produtos (linhas): " + totalProdutos + "</p>" +
                "<p>Total de itens (somando quantidades): " + totalItens + "</p>" +
                "<p>Valor total do estoque: R$ " + valorTotal.toFixed(2) + "</p>";
        }

        function limparTudo() {

            let area = document.getElementById("area-lista");
            let mensagem = document.getElementById("mensagem");
            let tbody = document.getElementById("lista-produtos");

            if (produtos.length === 0) {
                mensagem.innerText = "Não há produtos para remover.";
                return;
            }

            produtos = [];
            tbody.innerHTML = "";

            area.style.display = "none";

            mensagem.innerText = "Todos os produtos foram removidos.";
        }

        function removerPorIndice() {

            let mensagem = document.getElementById("mensagem");
            let indice = Number(document.getElementById("indice").value);

            if (isNaN(indice) || indice < 0 || indice >= produtos.length) {
                mensagem.innerText = "Índice inválido.";
                return;
            }

            produtos.splice(indice, 1);

            mensagem.innerText = "Produto removido com sucesso.";

            listarProdutos();

            document.getElementById("indice").value = "";
        }
    </script>
</body>
</html>
